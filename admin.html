<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Quiz Code Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    :root {
      --background: #1e1e2f;
      --shadow-in: #171723;
      --shadow-out: #25253b;
      --text: #fff;
      --accent: #1db954;
      --danger: #ff4d4d;
    }

    body.light {
      --background: #e0e0e0;
      --shadow-in: #bebebe;
      --shadow-out: #ffffff;
      --text: #333;
      --accent: #1db954;
      --danger: #d32f2f;
    }

    body {
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background: var(--background);
      border-radius: 20px;
      box-shadow: 10px 10px 20px var(--shadow-in), -10px -10px 20px var(--shadow-out);
      padding: 30px;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 30px;
      font-size: 28px;
    }

    .btn {
      background: var(--background);
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      transition: all 0.2s;
      margin: 10px 8px;
    }

    .btn:hover {
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    .btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 15px var(--accent), 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      font-size: 15px;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th {
      background: rgba(0,0,0,0.15);
      color: var(--accent);
    }

    .status-expired {
      color: #ff9800;
      font-weight: bold;
    }

    .status-active {
      color: var(--accent);
      font-weight: bold;
    }

    .status-not-assigned {
      color: #888;
    }

    .code {
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body class="dark">
<div class="container">
  <h1>Admin Panel – Access Code Management</h1>

  <div style="text-align: center; margin-bottom: 25px;">
    <button class="btn primary" onclick="generateCode()">Generate New Code</button>
    <button class="btn" onclick="toggleTheme()">Toggle Theme</button>
    <button class="btn danger" onclick="clearAll()">Delete All Data</button>
  </div>

  <table id="codeTable">
    <thead>
      <tr>
        <th>Code</th>
        <th>Created</th>
        <th>Expires</th>
        <th>Status</th>
        <th>Device</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const DB_KEY = 'quizCodesDB';
let codesDB = JSON.parse(localStorage.getItem(DB_KEY)) || [];

function saveDB() {
  localStorage.setItem(DB_KEY, JSON.stringify(codesDB));
}

function isExpired(createdDate) {
  if (!createdDate) return false;
  const expiry = new Date(createdDate);
  expiry.setMonth(expiry.getMonth() + 6);
  return new Date() > expiry;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}

function renderTable() {
  const tbody = document.querySelector('#codeTable tbody');
  tbody.innerHTML = '';

  codesDB.forEach((item, i) => {
    const expired = isExpired(item.createdAt);
    const statusText = expired ? 'Expired' : (item.deviceId ? 'Assigned' : 'Available');
    const statusClass = expired ? 'status-expired' : (item.deviceId ? 'status-active' : 'status-not-assigned');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="code">${item.code}</span></td>
      <td>${formatDate(item.createdAt)}</td>
      <td>${item.createdAt ? formatDate(new Date(item.createdAt).setMonth(new Date(item.createdAt).getMonth() + 6)) : '—'}</td>
      <td class="\( {statusClass}"> \){statusText}</td>
      <td>${item.deviceId ? item.deviceId.substring(0,12)+'…' : '<span style="color:#666">Not assigned</span>'}</td>
      <td>
        <button class="btn danger" onclick="revokeCode(${i})">Revoke</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function generateCode() {
  const code = Math.random().toString(36).substring(2,10).toUpperCase();
  codesDB.push({
    code,
    createdAt: new Date().toISOString(),
    deviceId: null,
    assignedAt: null
  });
  saveDB();
  renderTable();
}

function revokeCode(index) {
  if (confirm('Revoke and delete this code?')) {
    codesDB.splice(index, 1);
    saveDB();
    renderTable();
  }
}

function clearAll() {
  if (confirm('⚠️ This will DELETE ALL codes permanently. Continue?')) {
    localStorage.removeItem(DB_KEY);
    codesDB = [];
    renderTable();
  }
}

function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('adminTheme', document.body.classList.contains('light') ? 'light' : 'dark');
}

function loadTheme() {
  const saved = localStorage.getItem('adminTheme') || 'dark';
  if (saved === 'light') document.body.classList.add('light');
}

loadTheme();
renderTable();
</script>
</body>
</html>
