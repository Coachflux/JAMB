<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Quiz Platform</title>
  <style>
    /* Critical CSS - inline for fast paint */
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    :root{--bg:#1e1e2f;--si:#171723;--so:#25253b;--t:#fff;--a:#1db954;--d:#ff4d4d;--w:#ff9800}
    body.light{--bg:#e0e5ec;--si:#a3b1c6;--so:#ffffff;--t:#2d3748;--a:#48bb78;--d:#e53e3e;--w:#dd6b20}
    body{background:var(--bg);color:var(--t);min-height:100vh;line-height:1.6}
    
    /* Loading - minimal, fast */
    #load{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
    #load.hide{opacity:0;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid var(--si);border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Access screen */
    #access{display:none;min-height:100vh;padding:20px;align-items:center;justify-content:center}
    .card{background:var(--bg);padding:32px;border-radius:16px;width:100%;max-width:400px;box-shadow:8px 8px 16px var(--si),-8px -8px 16px var(--so)}
    .card h1{color:var(--a);margin-bottom:8px;font-size:24px}
    .card p{color:#888;font-size:14px;margin-bottom:24px}
    input{width:100%;padding:14px 16px;font-size:16px;border-radius:10px;border:none;background:var(--bg);color:var(--t);box-shadow:inset 3px 3px 6px var(--si),inset -3px -3px 6px var(--so);margin-bottom:16px}
    input:focus{outline:2px solid var(--a)}
    button.primary{width:100%;padding:14px;background:var(--a);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:4px 4px 8px var(--si);transition:transform .1s}
    button.primary:active{transform:scale(.98)}
    button.primary:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:16px;padding:10px;border-radius:8px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(255,77,77,.1);color:var(--d)}
    .msg.ok{background:rgba(29,185,84,.1);color:var(--a)}
    
    /* Quiz container */
    #quiz{display:none;max-width:800px;margin:0 auto;padding:72px 12px 80px}
    
    /* Fixed top bar - minimal */
    .top{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .top h1{font-size:15px;font-weight:600;flex:1;text-align:center}
    .btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;color:var(--t);cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;justify-content:center;font-size:16px}
    .btn:active{box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    
    /* Progress bar */
    .prog{position:fixed;top:56px;left:0;right:0;height:3px;background:var(--si);z-index:99}
    .prog-bar{height:100%;background:var(--a);width:0%;transition:width .2s}
    .prog-text{position:fixed;top:62px;right:12px;font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;box-shadow:1px 1px 2px var(--si)}
    
    /* Question area - optimized */
    .q-cont{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:4px 4px 8px var(--si),-4px -4px 8px var(--so)}
    .timer{font-size:13px;margin-bottom:12px;color:#888;display:flex;align-items:center;gap:6px}
    .timer.warn{color:var(--w);font-weight:600}
    .timer.danger{color:var(--d);font-weight:600;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .passage-type{display:inline-block;padding:4px 12px;background:var(--a);color:#fff;font-size:11px;border-radius:20px;margin-bottom:10px;font-weight:600}
    .passage{font-size:14px;line-height:1.7;margin-bottom:16px;padding:14px;background:rgba(0,0,0,.03);border-radius:8px;border-left:3px solid var(--a);max-height:250px;overflow-y:auto}
    .question{font-size:15px;font-weight:600;margin-bottom:14px;padding:12px;background:rgba(0,0,0,.03);border-radius:8px}
    
    /* Options - flat design for speed */
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{padding:14px 16px;background:var(--bg);border-radius:10px;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so);display:flex;align-items:center;gap:12px;transition:all .15s;border:2px solid transparent}
    .opt:hover{border-color:rgba(29,185,84,.3)}
    .opt.sel{border-color:var(--a);background:rgba(29,185,84,.05);box-shadow:inset 2px 2px 4px var(--si),inset -2px -2px 4px var(--so)}
    .opt-mark{width:26px;height:26px;border-radius:50%;background:var(--si);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .opt.sel .opt-mark{background:var(--a);color:#fff}
    .opt p{font-size:14px;flex:1}
    
    /* Navigation */
    .nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 12px;box-shadow:0 -2px 8px rgba(0,0,0,.1);z-index:100}
    .nav-btn{padding:10px 20px;border-radius:8px;border:none;background:var(--bg);color:var(--t);font-size:14px;font-weight:600;cursor:pointer;box-shadow:3px 3px 6px var(--si),-3px -3px 6px var(--so)}
    .nav-btn:disabled{opacity:.4;cursor:not-allowed}
    .nav-btn.primary{background:var(--a);color:#fff}
    .nav-center{width:44px;height:44px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(29,185,84,.3)}
    
    /* Popup - simplified */
    .pop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .pop.show{display:flex}
    .pop-box{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:360px;max-height:70vh;overflow-y:auto}
    .pop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .pop h3{font-size:16px}
    .pop-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
    .pop-grid button{aspect-ratio:1;border:none;border-radius:8px;background:var(--bg);color:var(--t);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 4px var(--si),-2px -2px 4px var(--so)}
    .pop-grid button.ans{background:var(--a);color:#fff}
    .pop-grid button.cur{border:2px solid var(--a)}
    
    /* Results */
    .res{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
    .res.show{display:flex}
    .res-circle{width:120px;height:120px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:6px 6px 12px var(--si),-6px -6px 12px var(--so)}
    .res-score{font-size:32px;font-weight:800;color:var(--a)}
    .res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
    .res h2{font-size:22px;margin-bottom:8px}
    .res p{color:#888;margin-bottom:24px;font-size:14px}
    .res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    
    /* Details */
    .det{display:none;position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto;padding:60px 12px 20px}
    .det-head{position:fixed;top:0;left:0;right:0;height:56px;background:var(--bg);display:flex;align-items:center;gap:12px;padding:0 12px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:251}
    .det h3{flex:1;font-size:15px}
    .det-item{margin-bottom:12px;padding:14px;background:rgba(0,0,0,.03);border-radius:10px;border-left:3px solid var(--d)}
    .det-item.ok{border-left-color:var(--a)}
    .det-item h4{font-size:13px;color:#888;margin-bottom:6px}
    .det-item p{font-size:14px;margin-bottom:4px}
    .det-item .exp{font-size:13px;color:#666;margin-top:8px;padding:10px;background:var(--bg);border-radius:6px;box-shadow:inset 2px 2px 4px var(--si)}
    
    /* Utilities */
    .hide{display:none!important}
    @media(max-width:400px){.passage{max-height:200px;font-size:13px}.opt{padding:12px}}
  </style>
</head>
<body>
  <!-- Fast loading screen -->
  <div id="load"><div class="spinner"></div></div>

  <!-- Access Screen -->
  <div id="access">
    <div class="card">
      <h1>🔐 Quiz Access</h1>
      <p>Enter code to begin</p>
      <input type="text" id="code" placeholder="8-char code" maxlength="8" autocomplete="off">
      <button class="primary" id="unlockBtn" onclick="unlock()">Start</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz">
    <div class="top">
      <button class="btn" onclick="exit()">←</button>
      <h1>Comprehension Quiz</h1>
      <button class="btn" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="prog"><div class="prog-bar" id="pbar"></div></div>
    <div class="prog-text" id="ptxt">0/0</div>
    
    <div class="q-cont">
      <div class="timer" id="timer">⏱️ 30:00</div>
      <div class="passage-type" id="ptype">Passage 1</div>
      <div class="passage" id="passage"></div>
      <div class="question" id="question"></div>
      <div class="opts" id="opts"></div>
    </div>
    
    <div class="nav">
      <button class="nav-btn" id="prev" onclick="prev()">← Prev</button>
      <button class="nav-center" onclick="showPop()">📋</button>
      <button class="nav-btn primary" id="next" onclick="next()">Next →</button>
    </div>
  </div>

  <!-- Navigator Popup -->
  <div class="pop" id="pop" onclick="hidePop(event)">
    <div class="pop-box" onclick="event.stopPropagation()">
      <div class="pop-head">
        <h3>Jump to Question</h3>
        <button class="btn" onclick="hidePop()">✕</button>
      </div>
      <div class="pop-grid" id="pgrid"></div>
      <div style="font-size:12px;color:#888;text-align:center">
        <span style="color:var(--a)">●</span> Answered &nbsp;
        <span style="color:var(--t)">●</span> Current
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-circle">
      <div class="res-score" id="rscore">0%</div>
      <div class="res-label">Score</div>
    </div>
    <h2 id="rtitle">Done!</h2>
    <p id="rmsg">Completed</p>
    <div class="res-btns">
      <button class="primary" onclick="showDet()" style="width:auto;padding:12px 24px">Details</button>
      <button class="nav-btn" onclick="restart()">Restart</button>
    </div>
  </div>

  <!-- Details -->
  <div class="det" id="det">
    <div class="det-head">
      <button class="btn" onclick="hideDet()">←</button>
      <h3>Detailed Results</h3>
      <button class="btn" onclick="print()">🖨️</button>
    </div>
    <div id="dcont"></div>
  </div>

<script>
// Minimal, fast JavaScript
const CONFIG={TIME:1800,PASS:60,DB:'quiz_db'};
let state={data:[],ans:[],p:0,q:0,time:CONFIG.TIME,timer:null};

// Optimized data structure - flat array for speed
const QUIZ_DATA=[
  {t:"Descriptive",pass:"The bustling Oshodi market...",qs:[
    {q:"Main purpose?",o:["Criticize","Describe atmosphere","Explain buying","Argue"],a:1,e:"Sensory details show chaos"},
    {q:"'Pulses' means?",o:["Dies","Beats strongly","Silent","Slow"],a:1,e:"Strong rhythm"},
    {q:"Writer's attitude?",o:["Disapproving","Neutral","Appreciative","Fearful"],a:2,e:"Positive words used"},
    {q:"Market is?",o:["Quiet","Crowded","Night-only","No food"],a:1,e:"Evidence of activity"},
    {q:"'Pulses with life' is?",o:["Simile","Metaphor","Personification","Hyperbole"],a:2,e:"Human quality given"}
  ]},
  {t:"Narrative",pass:"Ibrahim failed WAEC twice...",qs:[
    {q:"Story about?",o:["WAEC unfair","Perseverance","Uncle's work","Parties"],a:1,e:"Failure to success arc"},
    {q:"Why study nights?",o:["Games","Pass WAEC","Avoid work","Impress"],a:1,e:"Direct motivation"},
    {q:"'Perseverance' means?",o:["Quitting","Continuing","Cheating","Dreaming"],a:1,e:"Kept trying"},
    {q:"Teaches that?",o:["Failure final","Hard work pays","Uncles useless","Teaching easy"],a:1,e:"Moral lesson"},
    {q:"Ending is?",o:["Sad","Hopeful","Angry","Confusing"],a:1,e:"Positive resolution"}
  ]}
  // Add more passages...
];

// Fast initialization
function init(){
  state.data=QUIZ_DATA;
  state.ans=state.data.map(p=>Array(p.qs.length).fill(null));
  state.p=0;state.q=0;state.time=CONFIG.TIME;
  
  // Check saved
  const saved=sessionStorage.getItem('q');
  if(saved){
    const d=JSON.parse(saved);
    if(Date.now()-d.ts<86400000&&confirm('Resume?')){
      state.p=d.p;state.q=d.q;state.ans=d.ans;state.time=d.time;
    }
  }
  
  // Show access or quiz
  document.getElementById('load').classList.add('hide');
  if(localStorage.getItem('auth')) showQuiz();
  else document.getElementById('access').style.display='flex';
}

function unlock(){
  const c=document.getElementById('code').value.trim().toUpperCase();
  const btn=document.getElementById('unlockBtn');
  const msg=document.getElementById('msg');
  
  if(c.length!==8){showMsg('Enter 8 chars','err');return;}
  
  btn.disabled=true;
  // Simulate check
  setTimeout(()=>{
    if(!/^[A-Z0-9]{8}$/.test(c)){showMsg('Invalid','err');btn.disabled=false;return;}
    localStorage.setItem('auth',c);
    showMsg('Access granted!','ok');
    setTimeout(showQuiz,400);
  },200);
}

function showQuiz(){
  document.getElementById('access').style.display='none';
  document.getElementById('quiz').style.display='block';
  startTimer();
  render();
}

function showMsg(t,type){
  const m=document.getElementById('msg');
  m.textContent=t;m.className='msg show '+type;
}

function startTimer(){
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(()=>{
    if(state.time>0){
      state.time--;
      updateTimer();
      if(state.time%10===0)save();
    }else submit(true);
  },1000);
}

function updateTimer(){
  const m=Math.floor(state.time/60),s=state.time%60;
  const el=document.getElementById('timer');
  el.textContent=`⏱️ ${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(state.time<60?' danger':state.time<300?' warn':'');
}

function render(){
  const p=state.data[state.p];
  const q=p.qs[state.q];
  const isFirst=state.q===0;
  
  // Update progress
  const total=state.data.reduce((s,d)=>s+d.qs.length,0);
  const done=state.ans.flat().filter(x=>x!==null).length;
  document.getElementById('pbar').style.width=(done/total*100)+'%';
  document.getElementById('ptxt').textContent=`${done}/${total}`;
  
  // Passage
  document.getElementById('ptype').textContent=`${p.t} • Passage ${state.p+1}/${state.data.length}`;
  const passEl=document.getElementById('passage');
  if(isFirst){passEl.style.display='block';passEl.textContent=p.pass;}
  else passEl.style.display='none';
  
  // Question
  const global=state.data.slice(0,state.p).reduce((s,d)=>s+d.qs.length,0)+state.q+1;
  document.getElementById('question').textContent=`Q${global}. ${q.q}`;
  
  // Options - fast DOM
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(state.ans[state.p][state.q]===i?' sel':'');
    d.innerHTML=`<div class="opt-mark">${String.fromCharCode(65+i)}</div><p>${o}</p>`;
    d.onclick=()=>select(i);
    opts.appendChild(d);
  });
  
  // Buttons
  const isFirstQ=state.p===0&&state.q===0;
  const isLast=state.p===state.data.length-1&&state.q===p.qs.length-1;
  document.getElementById('prev').disabled=isFirstQ;
  document.getElementById('next').textContent=isLast?'Submit ✓':'Next →';
}

function select(i){
  state.ans[state.p][state.q]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.toggle('sel',idx===i);
  });
  save();
}

function next(){
  const p=state.data[state.p];
  const isLast=state.p===state.data.length-1&&state.q===p.qs.length-1;
  
  if(isLast){
    const unans=state.ans.flat().filter(x=>x===null).length;
    if(unans&&!confirm(`${unans} unanswered. Submit?`)){showPop();return;}
    submit();
    return;
  }
  
  if(state.q<p.qs.length-1)state.q++;
  else{state.p++;state.q=0;}
  render();
}

function prev(){
  if(state.q>0)state.q--;
  else if(state.p>0){state.p--;state.q=state.data[state.p].qs.length-1;}
  render();
}

function save(){
  sessionStorage.setItem('q',JSON.stringify({
    p:state.p,q:state.q,ans:state.ans,time:state.time,ts:Date.now()
  }));
}

function submit(timeout=false){
  clearInterval(state.timer);
  sessionStorage.removeItem('q');
  
  let correct=0,total=0;
  state.data.forEach((p,pi)=>{
    p.qs.forEach((q,qi)=>{
      total++;
      if(state.ans[pi][qi]===q.a)correct++;
    });
  });
  
  const pct=Math.round(correct/total*100);
  document.getElementById('rscore').textContent=pct+'%';
  document.getElementById('rtitle').textContent=pct>=CONFIG.PASS?'🎉 Passed!':timeout?'⏰ Time Up':'Done';
  document.getElementById('rmsg').textContent=`${correct}/${total} correct (${pct}%)`;
  
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').classList.add('show');
}

function showPop(){
  const g=document.getElementById('pgrid');
  g.innerHTML='';
  let n=0;
  state.data.forEach((p,pi)=>{
    p.qs.forEach((_,qi)=>{
      const b=document.createElement('button');
      b.textContent=++n;
      const ans=state.ans[pi][qi]!==null;
      const cur=pi===state.p&&qi===state.q;
      if(ans)b.className='ans';
      if(cur)b.className+=' cur';
      b.onclick=()=>{state.p=pi;state.q=qi;hidePop();render();};
      g.appendChild(b);
    });
  });
  document.getElementById('pop').classList.add('show');
}

function hidePop(e){
  if(!e||e.target.id==='pop')document.getElementById('pop').classList.remove('show');
}

function showDet(){
  const c=document.getElementById('dcont');
  c.innerHTML='';
  let n=0;
  
  state.data.forEach((p,pi)=>{
    const h=document.createElement('h4');
    h.textContent=`${p.t} Passage ${pi+1}`;
    h.style.cssText='color:var(--a);margin:16px 0 8px;font-size:14px';
    c.appendChild(h);
    
    p.qs.forEach((q,qi)=>{
      n++;
      const ans=state.ans[pi][qi];
      const ok=ans===q.a;
      const d=document.createElement('div');
      d.className='det-item'+(ok?' ok':'');
      d.innerHTML=`
        <h4>Q${n}</h4>
        <p>${q.q}</p>
        <p>You: ${ans!==null?String.fromCharCode(65+ans):'-'} | Correct: ${String.fromCharCode(65+q.a)}</p>
        <div class="exp">${q.e}</div>
      `;
      c.appendChild(d);
    });
  });
  
  document.getElementById('res').classList.remove('show');
  document.getElementById('det').style.display='block';
}

function hideDet(){
  document.getElementById('det').style.display='none';
  document.getElementById('res').classList.add('show');
}

function restart(){
  if(!confirm('Start over?'))return;
  localStorage.removeItem('auth');
  sessionStorage.removeItem('q');
  location.reload();
}

function exit(){
  if(confirm('Exit? Progress saved.')){save();location.reload();}
}

function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('th',document.body.classList.contains('light')?'l':'d');
}

// Fast start
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('th')==='l')document.body.classList.add('light');
  document.getElementById('code').addEventListener('keypress',e=>e.key==='Enter'&&unlock());
  init();
});
</script>
</body>
</html>
