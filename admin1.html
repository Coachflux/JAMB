<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopScore Bulk Code Generator</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      margin:0;
      background:#1e1e2f;
      color:#fff;
      padding:20px;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
    }
    .card{
      background:#232338;
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }
    h1{
      margin:0 0 8px;
      color:#1db954;
    }
    p{
      color:#b8bfd3;
      margin:0 0 20px;
    }
    .grid{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:20px;
    }
    label{
      display:block;
      margin-bottom:6px;
      color:#b8bfd3;
      font-size:14px;
    }
    input, textarea{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#181824;
      color:#fff;
      margin-bottom:14px;
      font-size:14px;
    }
    textarea{
      min-height:220px;
      resize:vertical;
    }
    button{
      border:none;
      border-radius:10px;
      padding:12px 16px;
      cursor:pointer;
      font-weight:700;
      margin:4px 6px 8px 0;
    }
    .primary{background:#1db954;color:#fff}
    .secondary{background:#2e3148;color:#fff}
    .danger{background:#ff4d4d;color:#fff}
    .status{
      margin-top:10px;
      color:#1db954;
      font-size:14px;
      min-height:20px;
    }
    .stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .stat{
      background:#181824;
      padding:12px 16px;
      border-radius:10px;
      min-width:120px;
    }
    .stat strong{
      display:block;
      color:#1db954;
      font-size:18px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:14px;
    }
    th, td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
    }
    th{
      color:#b8bfd3;
    }
    .section-title{
      margin-bottom:14px;
      font-size:18px;
      font-weight:700;
    }
    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TopScore Bulk Code Generator</h1>
      <p>Generate unique access codes and export them as JSON and CSV.</p>
    </div>

    <div class="grid">
      <div class="card">
        <div class="section-title">Settings</div>

        <label for="quizId">Quiz ID</label>
        <input id="quizId" value="jamb-physics-motion">

        <label for="count">How many codes?</label>
        <input id="count" type="number" value="100" min="1">

        <label for="ownerPrefix">Owner prefix</label>
        <input id="ownerPrefix" value="TopScore User">

        <label for="codeLength">Code length</label>
        <input id="codeLength" type="number" value="10" min="4" max="20">

        <button class="primary" id="generateBtn">Generate Codes</button>
        <button class="secondary" id="shuffleBtn">Shuffle Preview</button>
        <button class="danger" id="clearBtn">Clear</button>

        <div class="status" id="statusMsg"></div>

        <div class="stats">
          <div class="stat">
            <strong id="statCount">0</strong>
            <span>Generated</span>
          </div>
          <div class="stat">
            <strong id="statLength">10</strong>
            <span>Length</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Preview</div>
        <div style="overflow:auto;">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Access Code</th>
                <th>Quiz ID</th>
                <th>Status</th>
                <th>Owner</th>
              </tr>
            </thead>
            <tbody id="previewBody">
              <tr><td colspan="5">Nothing generated yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="section-title">Firebase JSON</div>
        <button class="secondary" id="copyJsonBtn">Copy JSON</button>
        <button class="primary" id="downloadJsonBtn">Download JSON</button>
        <textarea id="jsonOutput"></textarea>
      </div>

      <div class="card">
        <div class="section-title">CSV</div>
        <button class="secondary" id="copyCsvBtn">Copy CSV</button>
        <button class="primary" id="downloadCsvBtn">Download CSV</button>
        <textarea id="csvOutput"></textarea>
      </div>
    </div>
  </div>

  <script>
    var generatedList = [];
    var CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    function setStatus(msg, isError){
      var el = document.getElementById("statusMsg");
      el.style.color = isError ? "#ff4d4d" : "#1db954";
      el.textContent = msg;
    }

    function randomCode(length){
      var code = "";
      for(var i=0;i<length;i++){
        code += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
      }
      return code;
    }

    function updateStats(length){
      document.getElementById("statCount").textContent = generatedList.length;
      document.getElementById("statLength").textContent = length || 0;
    }

    function renderPreview(){
      var body = document.getElementById("previewBody");

      if(!generatedList.length){
        body.innerHTML = '<tr><td colspan="5">Nothing generated yet.</td></tr>';
        return;
      }

      var rows = "";
      var limit = Math.min(generatedList.length, 100);

      for(var i=0;i<limit;i++){
        var item = generatedList[i];
        rows += "<tr>" +
          "<td>" + (i+1) + "</td>" +
          "<td><strong>" + item.accessCode + "</strong></td>" +
          "<td>" + item.quizId + "</td>" +
          "<td>" + item.status + "</td>" +
          "<td>" + item.ownerName + "</td>" +
          "</tr>";
      }

      body.innerHTML = rows;
    }

    function renderOutputs(){
      var jsonObj = { quiz_access_codes: {} };

      for(var i=0;i<generatedList.length;i++){
        var item = generatedList[i];
        jsonObj.quiz_access_codes[item.accessCode] = {
          quizId: item.quizId,
          accessCode: item.accessCode,
          status: item.status,
          deviceToken: item.deviceToken,
          activatedAt: item.activatedAt,
          lastSeenAt: item.lastSeenAt,
          expiresAt: item.expiresAt,
          ownerName: item.ownerName
        };
      }

      document.getElementById("jsonOutput").value = JSON.stringify(jsonObj, null, 2);

      var csv = "accessCode,quizId,status,deviceToken,activatedAt,lastSeenAt,expiresAt,ownerName
";
      for(var j=0;j<generatedList.length;j++){
        var x = generatedList[j];
        csv += [
          x.accessCode,
          x.quizId,
          x.status,
          x.deviceToken || "",
          x.activatedAt || "",
          x.lastSeenAt || "",
          x.expiresAt || "",
          '"' + String(x.ownerName).replace(/"/g,'""') + '"'
        ].join(",") + "
";
      }

      document.getElementById("csvOutput").value = csv;
    }

    function generateCodes(){
      var quizId = document.getElementById("quizId").value.trim();
      var count = parseInt(document.getElementById("count").value, 10);
      var ownerPrefix = document.getElementById("ownerPrefix").value.trim() || "TopScore User";
      var codeLength = parseInt(document.getElementById("codeLength").value, 10);

      if(!quizId){
        setStatus("Please enter a quiz ID.", true);
        return;
      }

      if(!count || count < 1){
        setStatus("Please enter a valid number of codes.", true);
        return;
      }

      if(!codeLength || codeLength < 4){
        setStatus("Please enter a valid code length.", true);
        return;
      }

      generatedList = [];
      var used = {};

      while(generatedList.length < count){
        var code = randomCode(codeLength);
        if(used[code]) continue;
        used[code] = true;

        generatedList.push({
          accessCode: code,
          quizId: quizId,
          status: "unused",
          deviceToken: null,
          activatedAt: null,
          lastSeenAt: null,
          expiresAt: null,
          ownerName: ownerPrefix + " " + (generatedList.length + 1)
        });
      }

      renderPreview();
      renderOutputs();
      updateStats(codeLength);
      setStatus(generatedList.length + " codes generated successfully.", false);
    }

    function shuffleCodes(){
      if(!generatedList.length){
        setStatus("Generate codes first.", true);
        return;
      }

      for(var i=generatedList.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var temp=generatedList[i];
        generatedList[i]=generatedList[j];
        generatedList[j]=temp;
      }

      renderPreview();
      renderOutputs();
      setStatus("Preview shuffled.", false);
    }

    function clearAllData(){
      generatedList = [];
      document.getElementById("jsonOutput").value = "";
      document.getElementById("csvOutput").value = "";
      document.getElementById("previewBody").innerHTML = '<tr><td colspan="5">Nothing generated yet.</td></tr>';
      updateStats(0);
      setStatus("Cleared.", false);
    }

    function downloadFile(filename, content, type){
      var blob = new Blob([content], {type:type});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadJson(){
      var text = document.getElementById("jsonOutput").value;
      if(!text){
        setStatus("Generate codes first.", true);
        return;
      }
      downloadFile("quiz-codes.json", text, "application/json");
    }

    function downloadCsv(){
      var text = document.getElementById("csvOutput").value;
      if(!text){
        setStatus("Generate codes first.", true);
        return;
      }
      downloadFile("quiz-codes.csv", text, "text/csv");
    }

    function copyJson(){
      var text = document.getElementById("jsonOutput").value;
      if(!text){
        setStatus("Generate codes first.", true);
        return;
      }
      navigator.clipboard.writeText(text).then(function(){
        setStatus("JSON copied.", false);
      });
    }

    function copyCsv(){
      var text = document.getElementById("csvOutput").value;
      if(!text){
        setStatus("Generate codes first.", true);
        return;
      }
      navigator.clipboard.writeText(text).then(function(){
        setStatus("CSV copied.", false);
      });
    }

    document.getElementById("generateBtn").addEventListener("click", generateCodes);
    document.getElementById("shuffleBtn").addEventListener("click", shuffleCodes);
    document.getElementById("clearBtn").addEventListener("click", clearAllData);
    document.getElementById("downloadJsonBtn").addEventListener("click", downloadJson);
    document.getElementById("downloadCsvBtn").addEventListener("click", downloadCsv);
    document.getElementById("copyJsonBtn").addEventListener("click", copyJson);
    document.getElementById("copyCsvBtn").addEventListener("click", copyCsv);

    updateStats(10);
  </script>
</body>
</html>
